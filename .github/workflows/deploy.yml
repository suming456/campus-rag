name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "=== Starting deployment ==="
            cd ~/projects/rag-demo
            echo "Current directory: $(pwd)"
            git pull origin main
            echo "Python3 path: $(which python3)"
            echo "Screen path: $(which screen)"
            if screen -list | grep -q "myapp"; then
              echo "Stopping existing screen session..."
              screen -S myapp -X quit
              sleep 1
            fi
            echo "Starting new screen session..."
            screen -dmS myapp python3 hello.py
            sleep 2
            echo "Screen sessions after start:"
            screen -ls
            echo "=== Deployment completed ==="
          EOF